<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Happy Birthday</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    font-family: 'Georgia', serif;
    -webkit-tap-highlight-color: transparent;
  }
  .scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* HINT */
  .hint {
    position: absolute;
    top: 6%;
    left: 50%;
    transform: translateX(-50%);
    color: #e91e8c;
    font-size: clamp(13px, 3vw, 19px);
    font-style: italic;
    text-align: center;
    animation: pulse 1.5s ease-in-out infinite;
    z-index: 100;
    white-space: nowrap;
    transition: opacity 0.6s;
  }
  .hint.hidden { opacity: 0; pointer-events: none; }
  @keyframes pulse {
    0%,100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ENVELOPE */
  .envelope {
    position: relative;
    transform: rotate(90deg);
    width: clamp(240px, 55vw, 400px);
    height: clamp(180px, 42vw, 310px);
  }
  .env-bottom, .env-top {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  .env-bottom img, .env-top img {
    width: 100%; height: 100%;
    object-fit: fill;
  }
  .env-bottom { z-index: 1; }
  .env-top { z-index: 3; }

  /* CARD IN ENVELOPE */
  .card-inner {
    position: absolute;
    top: 8%; left: 8%;
    width: 84%; height: 84%;
    z-index: 2;
  }
  .card-inner img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 3px;
  }

  /* RIBBONS */
  .ribbons {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 4;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8%;
    transform: rotate(-90deg);
  }
  .ribbon {
    width: clamp(65px, 16vw, 120px);
    cursor: pointer;
    transition: transform 0.35s, opacity 0.45s;
    filter: drop-shadow(1px 2px 4px rgba(0,0,0,0.25));
  }
  .ribbon:hover { transform: scale(1.12); }
  .ribbon:active { transform: scale(0.95); }
  .ribbon.popped { opacity: 0; pointer-events: none; transform: scale(0.2); }
  .ribbon img { width: 100%; height: auto; }

  /* BUBBLES */
  .bubble {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
  }
  .bubble img {
    width: clamp(240px, 65vw, 480px);
    height: auto;
    filter: drop-shadow(3px 5px 10px rgba(0,0,0,0.3));
  }
  .bubble.show { animation: bIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
  .bubble.hide { animation: bOut 0.4s ease-in forwards; }
  @keyframes bIn {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
    100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
  }
  @keyframes bOut {
    0% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(0.2); opacity: 0; }
  }

  /* CARD OVERLAY */
  .card-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 150;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s;
    padding: 20px;
  }
  .card-overlay.show { opacity: 1; pointer-events: auto; }
  .card-overlay img {
    max-width: min(85vw, 420px);
    max-height: 60vh;
    height: auto;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 8px 35px rgba(0,0,0,0.22);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* DOWNLOAD */
  .dl-btn {
    margin-top: 20px;
    opacity: 0;
    cursor: pointer;
    transform: translateY(60px);
    transition: transform 0.6s cubic-bezier(0.175,0.885,0.32,1.275), opacity 0.5s;
    pointer-events: none;
  }
  .dl-btn.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .dl-btn:hover { transform: scale(1.05); }
  .dl-btn:active { transform: scale(0.97); }
  .dl-btn img {
    width: clamp(160px, 38vw, 280px);
    height: auto;
    filter: drop-shadow(2px 3px 6px rgba(0,0,0,0.2));
  }
</style>
</head>
<body>
<div class="scene">
  <div class="hint" id="hint">✨ Tap the ribbons! ✨</div>

  <div class="envelope" id="envelope">
    <div class="env-bottom"><img src="letter-bottom.png" alt=""></div>
    <div class="card-inner" id="cardInner"><img src="birthday-card.png" alt=""></div>
    <div class="env-top"><img src="letter-top.png" alt=""></div>
    <div class="ribbons">
      <div class="ribbon" id="r1" onclick="pop(1)"><img src="ribbon-1.png" alt=""></div>
      <div class="ribbon" id="r2" onclick="pop(2)"><img src="ribbon-2.png" alt=""></div>
    </div>
  </div>

  <div class="bubble" id="b1"><img src="pop-1.png" alt=""></div>
  <div class="bubble" id="b2"><img src="pop-2.png" alt=""></div>

  <div class="card-overlay" id="overlay">
    <img src="birthday-card.png" alt="" id="cardImg">
    <div class="dl-btn" id="dlBtn" onclick="dl()"><img src="pop-3.png" alt=""></div>
  </div>
</div>

<script>
let cnt = 0;
function pop(n) {
  const r = document.getElementById('r'+n);
  if (r.classList.contains('popped')) return;
  r.classList.add('popped');
  const b = document.getElementById('b'+n);
  setTimeout(() => b.classList.add('show'), 350);
  setTimeout(() => { b.classList.remove('show'); b.classList.add('hide'); }, 3350);
  setTimeout(() => b.classList.remove('hide'), 3800);
  cnt++;
  if (cnt >= 2) {
    setTimeout(() => {
      document.getElementById('hint').classList.add('hidden');
      const c = document.getElementById('cardInner');
      c.style.transition = 'transform 1s ease-in-out, opacity 0.9s';
      c.style.transform = 'translateY(-140%)';
      c.style.opacity = '0';
      setTimeout(() => document.getElementById('overlay').classList.add('show'), 1200);
      setTimeout(() => document.getElementById('dlBtn').classList.add('show'), 1900);
    }, 4200);
  }
}
function dl() {
  const a = document.createElement('a');
  a.href = 'birthday-card.png';
  a.download = 'happy-birthday-0206.png';
  a.click();
}
</script>
</body>
</html>
